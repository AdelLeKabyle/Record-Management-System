<svg xmlns="http://www.w3.org/2000/svg" width="620" height="480" viewBox="0 0 620 480" font-family="'Cascadia Code','Cascadia Mono',Consolas,Menlo,'DejaVu Sans Mono',monospace" font-size="14">
