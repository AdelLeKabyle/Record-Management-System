    <text x="20" y="175" fill="#E3B341">  • 6 record(s) loaded from data/records.db</text>
    <text x="20" y="217" fill="#3A96DD">  ┌─────────── MENU ────────────┐</text>
    <text x="20" y="238"><tspan fill="#3A96DD">  │ </tspan><tspan fill="#FFFFFF" font-weight="bold">1</tspan><tspan>. Add a record            </tspan><tspan fill="#3A96DD"> │</tspan></text>
    <text x="20" y="259"><tspan fill="#3A96DD">  │ </tspan><tspan fill="#FFFFFF" font-weight="bold">2</tspan><tspan>. Display all records     </tspan><tspan fill="#3A96DD"> │</tspan></text>
    <text x="20" y="280"><tspan fill="#3A96DD">  │ </tspan><tspan fill="#FFFFFF" font-weight="bold">3</tspan><tspan>. Search a record         </tspan><tspan fill="#3A96DD"> │</tspan></text>
    <text x="20" y="301"><tspan fill="#3A96DD">  │ </tspan><tspan fill="#FFFFFF" font-weight="bold">4</tspan><tspan>. Update a record         </tspan><tspan fill="#3A96DD"> │</tspan></text>
    <text x="20" y="322"><tspan fill="#3A96DD">  │ </tspan><tspan fill="#FFFFFF" font-weight="bold">5</tspan><tspan>. Delete a record         </tspan><tspan fill="#3A96DD"> │</tspan></text>
    <text x="20" y="343"><tspan fill="#3A96DD">  │ </tspan><tspan fill="#FFFFFF" font-weight="bold">6</tspan><tspan>. Sort records            </tspan><tspan fill="#3A96DD"> │</tspan></text>
